version: "1.0"
doc_type: fault_code_knowledge_base
product_family: "Aqualink 家用洗衣机虚构数据集"
notes:
  - "本故障码表用于 RAG 项目演示，不对应任何真实品牌的正式故障码定义。"
  - "外部用户自检必须受 safety_boundaries.md 约束。"
fault_codes:
  - code: "E1"
    models: ["X100", "X200", "W80"]
    meaning: "进水异常或进水超时"
    severity: "medium"
    common_causes:
      - "水龙头未完全打开或小区停水"
      - "进水管弯折、压扁或被家具压住"
      - "进水阀滤网被泥沙堵塞"
      - "水压低于机器启动要求"
      - "进水阀或水位传感器异常"
    user_self_check:
      - "确认同一水龙头或其他水龙头是否有水"
      - "完全打开水龙头，检查进水管是否弯折"
      - "关闭水龙头后清理进水管接口滤网表面泥沙"
      - "断电 5 分钟后重新选择标准程序"
    do_not:
      - "不得拆卸进水阀"
      - "不得打开后盖检查强电线路"
      - "不得私自加装增压泵接入机器内部"
    report_conditions:
      - "确认有水且水压正常后仍出现 E1"
      - "进水阀位置有异响但不进水"
      - "同一程序反复进水后立即报警"
    related_flows: ["F_INLET", "F_NO_START"]

  - code: "E2"
    models: ["X100", "X200", "W80"]
    meaning: "排水异常"
    severity: "medium"
    common_causes:
      - "排水管弯折、压扁或高度不符合要求"
      - "排水过滤器或毛絮过滤器堵塞"
      - "地漏堵塞或排水管插入地漏过深"
      - "排水泵或排水阀异常"
      - "水位传感器反馈异常"
    user_self_check:
      - "检查排水管是否弯折或被重物压住"
      - "滚筒机清理排水泵过滤器，波轮机清理毛絮过滤器"
      - "确认地漏排水通畅"
      - "执行单脱水或单排水程序观察是否能排水"
      - "断电 5 分钟后重启设备"
    do_not:
      - "不得拆卸排水泵"
      - "不得打开底部电路区域"
      - "不得用铁丝深入机身内部疏通"
    report_conditions:
      - "自检后仍无法排水"
      - "伴随排水泵异常噪音或焦味"
      - "反复出现 E2"
    related_flows: ["F_DRAIN", "F_NO_SPIN"]

  - code: "E3"
    models: ["X100", "X200", "W80"]
    meaning: "门锁或上盖锁异常"
    severity: "medium"
    common_causes:
      - "机门或上盖未关严"
      - "门封圈夹住衣物"
      - "锁扣位置有异物"
      - "烘干后筒内温度较高，门锁延迟释放"
      - "门锁组件或上盖锁组件异常"
    user_self_check:
      - "重新打开并关闭机门或上盖"
      - "检查门封圈、上盖锁扣处是否夹住衣物或异物"
      - "X200 烘干结束后等待 10-30 分钟冷却再尝试开门"
      - "断电 5 分钟后重新上电"
    do_not:
      - "不得强拉机门"
      - "不得短接门锁或上盖锁"
      - "不得拆卸锁扣、门锁线束或控制板"
    report_conditions:
      - "门已关严仍提示 E3"
      - "门锁无法释放超过 30 分钟"
      - "门锁位置有烧焦味或异常发热"
    related_flows: ["F_DOOR_LOCK", "F_NO_START"]

  - code: "E4"
    models: ["X100", "X200", "W80"]
    meaning: "水位异常或溢水保护"
    severity: "high"
    common_causes:
      - "水位传感器异常"
      - "进水阀关闭不严"
      - "排水不畅导致水位反馈异常"
      - "主控板水位判断异常"
    user_self_check:
      - "立即暂停程序"
      - "关闭水龙头"
      - "断开电源"
      - "观察是否有持续进水或机底漏水"
    do_not:
      - "不得继续运行洗涤程序"
      - "不得拆卸水位传感器"
      - "不得打开主控板区域"
    report_conditions:
      - "出现 E4 即建议报修"
      - "水龙头关闭后桶内仍水位异常"
      - "伴随机底漏水"
    related_flows: ["F_LEAK", "F_INLET"]

  - code: "E5"
    models: ["X100", "X200", "W80"]
    meaning: "电机转动、测速或离合器异常"
    severity: "high"
    common_causes:
      - "衣物过量导致电机负载过大"
      - "衣物缠绕成团"
      - "异物卡住内筒或波轮"
      - "电机测速反馈异常"
      - "W80 离合器异常"
    user_self_check:
      - "取出部分衣物，确认内筒或波轮可轻微转动"
      - "重新分布衣物，避免大件单独洗涤"
      - "断电 5 分钟后重启"
    do_not:
      - "不得拆卸电机、皮带、离合器或后盖"
      - "不得用工具撬动内筒"
      - "不得继续反复启动机器"
    report_conditions:
      - "空桶运行仍提示 E5"
      - "有金属摩擦声、焦味或跳闸"
      - "脱水阶段反复停止并报警"
    related_flows: ["F_NO_SPIN", "F_NOISE"]

  - code: "E6"
    models: ["X100", "X200"]
    meaning: "洗涤温度传感器异常"
    severity: "high"
    common_causes:
      - "温度传感器开路或短路"
      - "传感器线束接触异常"
      - "主控板温度检测异常"
    user_self_check:
      - "停止高温洗程序"
      - "断电 5 分钟后选择冷水标准洗观察"
    do_not:
      - "不得拆卸温度传感器"
      - "不得打开加热管区域"
      - "不得继续使用高温洗"
    report_conditions:
      - "冷水程序仍提示 E6"
      - "高温洗无法启动或反复中断"
      - "伴随跳闸或焦味"
    related_flows: ["F_NO_START"]

  - code: "E7"
    models: ["X100", "X200"]
    meaning: "加热异常"
    severity: "high"
    common_causes:
      - "加热管异常"
      - "温控保护动作"
      - "加热回路或主控板异常"
      - "水位不足时误触发加热保护"
    user_self_check:
      - "停止高温洗或烘干相关程序"
      - "断电 5 分钟后选择冷水洗观察"
    do_not:
      - "不得拆卸加热管"
      - "不得检查强电线路"
      - "不得用外接电源测试加热组件"
    report_conditions:
      - "出现 E7 即建议售后检测"
      - "伴随异味、跳闸或面板异常"
      - "冷水程序正常但高温程序反复失败"
    related_flows: ["F_NO_START", "F_DRYING"]

  - code: "E8"
    models: ["X100", "X200", "W80"]
    meaning: "主控通信异常"
    severity: "high"
    common_causes:
      - "显示板与主控板通信异常"
      - "线束接触不良"
      - "电源波动"
      - "控制板故障"
    user_self_check:
      - "断电 5 分钟后重新上电"
      - "确认插座稳定，不与大功率电器共用拖线板"
    do_not:
      - "不得打开控制面板"
      - "不得插拔内部线束"
      - "不得继续反复通电试机"
    report_conditions:
      - "断电重启后仍提示 E8"
      - "面板乱码、按键失灵或自动重启"
      - "伴随烧焦味或跳闸"
    related_flows: ["F_NO_START"]

  - code: "E9"
    models: ["X100", "X200"]
    meaning: "泡沫过多或泡沫排除失败"
    severity: "low"
    common_causes:
      - "洗涤剂过量"
      - "使用非滚筒低泡洗涤剂"
      - "洗涤剂盒残留过多"
      - "衣物上残留大量清洁剂"
    user_self_check:
      - "暂停等待 20-30 分钟自然消泡"
      - "选择单漂洗或筒自洁清除残留"
      - "下次减少洗涤剂用量并使用低泡洗涤剂"
    do_not:
      - "不得向筒内加入消泡剂、酒精或溶剂"
      - "不得拆卸水位传感器软管"
    report_conditions:
      - "未加洗涤剂仍反复出现 E9"
      - "伴随排水异常或水位异常"
      - "泡沫从洗涤剂盒大量溢出且无法停止"
    related_flows: ["F_WASH_RESULT", "F_DRAIN"]

  - code: "E10"
    models: ["X100", "X200", "W80"]
    meaning: "脱水偏载或不平衡"
    severity: "low"
    common_causes:
      - "单件大衣物吸水后集中在一侧"
      - "衣物过少，机器无法建立平衡"
      - "地面不平或底脚未调平"
      - "防水类衣物导致甩水不均"
    user_self_check:
      - "暂停后重新抖散衣物"
      - "大小件混放，加入 1-2 件小衣物平衡"
      - "检查机器是否放平，四脚是否贴地"
      - "选择较低转速重新脱水"
    do_not:
      - "不得强行重复高速脱水"
      - "不得单独脱水防水雨衣、车罩、厚地垫"
      - "不得拆卸减震器或平衡环"
    report_conditions:
      - "空桶脱水仍明显撞桶"
      - "调平和调整衣物后仍反复 E10"
      - "伴随明显金属撞击声"
    related_flows: ["F_NO_SPIN", "F_NOISE"]

  - code: "E11"
    models: ["X200"]
    meaning: "烘干温度异常"
    severity: "high"
    common_causes:
      - "烘干负载过大"
      - "衣物未充分脱水"
      - "温度传感器异常"
      - "烘干风道散热不良"
      - "加热组件异常"
    user_self_check:
      - "停止烘干并等待冷却"
      - "减少衣物，确认衣物已充分脱水"
      - "擦除筒口和门封圈毛絮"
      - "运行风道清洁"
    do_not:
      - "不得拆卸烘干加热组件"
      - "不得在高温状态强行开门"
      - "不得继续连续满载烘干"
    report_conditions:
      - "少量衣物烘干仍提示 E11"
      - "伴随焦味或过热保护频繁触发"
      - "等待冷却后仍无法启动烘干"
    related_flows: ["F_DRYING"]

  - code: "E12"
    models: ["X200"]
    meaning: "烘干风道或冷凝水路异常"
    severity: "medium"
    common_causes:
      - "门封圈和筒口毛絮堆积"
      - "烘干风道堵塞"
      - "冷凝水路不畅"
      - "排水不畅影响冷凝水排出"
      - "风机异常"
    user_self_check:
      - "清理门封圈、筒口和玻璃门毛絮"
      - "检查排水管是否弯折"
      - "运行风道清洁程序"
      - "减少烘干负载后重新尝试"
    do_not:
      - "不得拆卸风机、风道或冷凝水路"
      - "不得用水冲洗机身内部"
      - "不得用硬物深入风道"
    report_conditions:
      - "风道清洁后仍提示 E12"
      - "烘干 2 小时以上仍明显潮湿"
      - "烘干时无风声或有异常摩擦声"
    related_flows: ["F_DRYING", "F_DRAIN"]

  - code: "E13"
    models: ["X200"]
    meaning: "门锁未释放或筒内高温保护"
    severity: "medium"
    common_causes:
      - "烘干刚结束，筒内温度高"
      - "冷却阶段被中断"
      - "门锁组件异常"
      - "温度检测异常"
    user_self_check:
      - "等待 10-30 分钟自然冷却"
      - "确认机器已停止转动"
      - "断电 5 分钟后重新上电"
    do_not:
      - "不得强拉机门"
      - "不得撬动门锁"
      - "不得短接门锁保护"
    report_conditions:
      - "冷却 30 分钟后仍无法开门"
      - "面板持续显示 E13"
      - "门锁区域发热或有异味"
    related_flows: ["F_DOOR_LOCK", "F_DRYING"]

  - code: "F1"
    models: ["X100", "X200", "W80"]
    meaning: "水位传感器异常"
    severity: "high"
    common_causes:
      - "水位传感器失效"
      - "压力管脱落或堵塞"
      - "主控板检测异常"
      - "排水或进水状态异常导致误判"
    user_self_check:
      - "断电 5 分钟后重启"
      - "确认桶内是否有明显积水"
      - "若桶内有水，先按 E2 排水流程检查排水管和过滤器"
    do_not:
      - "不得拆卸水位传感器或压力管"
      - "不得向压力管吹气"
      - "不得打开主控板区域"
    report_conditions:
      - "出现 F1 即建议售后检测"
      - "桶内无水却显示高水位"
      - "机器反复进水或无法进入脱水"
    related_flows: ["F_DRAIN", "F_INLET", "F_LEAK"]

  - code: "F2"
    models: ["X100", "X200", "W80"]
    meaning: "进水阀关闭异常"
    severity: "high"
    common_causes:
      - "进水阀卡滞"
      - "水压异常"
      - "主控板进水控制异常"
    user_self_check:
      - "关闭水龙头"
      - "断开电源"
      - "观察断电后是否仍有进水声"
    do_not:
      - "不得拆卸进水阀"
      - "不得继续运行程序"
      - "不得打开后盖处理内部水路"
    report_conditions:
      - "断电后仍进水"
      - "关闭水龙头前桶内水位持续上升"
      - "伴随 E4 溢水提示"
    related_flows: ["F_INLET", "F_LEAK"]

  - code: "F3"
    models: ["X100", "X200"]
    meaning: "排水泵工作异常"
    severity: "high"
    common_causes:
      - "排水泵叶轮被异物卡住"
      - "排水泵线圈异常"
      - "排水泵供电异常"
      - "过滤器长期未清理"
    user_self_check:
      - "断电后清理排水泵过滤器"
      - "确认过滤器复位并拧紧"
      - "重新运行单脱水观察"
    do_not:
      - "不得拆卸排水泵"
      - "不得用工具拨动内部叶轮"
      - "不得打开底部电路区域"
    report_conditions:
      - "清理过滤器后仍不排水"
      - "排水泵持续嗡鸣或异响"
      - "机底漏水"
    related_flows: ["F_DRAIN", "F_NO_SPIN"]

  - code: "F4"
    models: ["X100", "X200", "W80"]
    meaning: "电机过热或驱动保护"
    severity: "high"
    common_causes:
      - "连续高负载运行"
      - "衣物过量或吸水后过重"
      - "电机散热不良"
      - "驱动板保护"
    user_self_check:
      - "停止使用并等待 30 分钟"
      - "取出部分衣物"
      - "确认机器周围通风良好"
    do_not:
      - "不得拆卸电机或驱动板"
      - "不得立即连续重启"
      - "不得继续高负载脱水"
    report_conditions:
      - "冷却后空桶运行仍提示 F4"
      - "有焦味、跳闸或异常噪音"
      - "同一天多次出现 F4"
    related_flows: ["F_NO_SPIN", "F_NOISE"]

  - code: "CL"
    models: ["X100", "X200", "W80"]
    meaning: "童锁或按键锁启用"
    severity: "info"
    common_causes:
      - "误触童锁组合键"
      - "清洁面板时长按按键"
      - "儿童误操作"
    user_self_check:
      - "X100 长按“温度”和“转速”3 秒"
      - "X200 长按“烘干”和“预约”3 秒"
      - "W80 长按“水位”和“程序”3 秒"
    do_not:
      - "不得强行拔插控制面板排线"
      - "不得用尖锐物持续按压按键"
    report_conditions:
      - "解除组合键无效且按键无反应"
      - "面板同时出现乱码或 E8"
    related_flows: ["F_NO_START"]

  - code: "PF"
    models: ["X100", "X200", "W80"]
    meaning: "断电恢复或电源波动"
    severity: "info"
    common_causes:
      - "家庭临时停电"
      - "插座接触不良"
      - "与大功率电器共用拖线板"
      - "电源电压波动"
    user_self_check:
      - "确认插座供电稳定"
      - "避免与电热水器、空调等大功率电器共用拖线板"
      - "重新选择程序"
    do_not:
      - "不得自行拆开电源线或插头"
      - "不得使用破损拖线板"
    report_conditions:
      - "同一插座其他电器也频繁断电"
      - "洗衣机插头或电源线发热"
      - "重启后立即再次 PF"
    related_flows: ["F_NO_START"]

  - code: "LE"
    models: ["X100", "X200", "W80"]
    meaning: "漏水或底盘进水保护"
    severity: "critical"
    common_causes:
      - "进水管接头松动"
      - "排水管脱落或破裂"
      - "门封圈夹异物导致渗水"
      - "内部水路漏水"
      - "泡沫过多溢出"
    user_self_check:
      - "立即停止程序"
      - "关闭水龙头"
      - "拔下电源插头"
      - "擦干地面积水，观察漏水来源是否在外部软管"
    do_not:
      - "不得继续通电运行"
      - "不得打开底部或后盖检查内部水路"
      - "不得用水冲洗机身"
    report_conditions:
      - "出现 LE 或机底漏水即建议报修"
      - "外部软管拧紧后仍漏水"
      - "漏水伴随跳闸或焦味"
    related_flows: ["F_LEAK"]
