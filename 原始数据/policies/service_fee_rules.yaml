version: "1.1"
doc_type: service_fee_rules
purpose: "按公开售后政策归纳费用判断口径；不编造具体维修价格。"
currency: "CNY"
scope_note:
  - "本文件用于智能客服测试，不代表任何真实品牌的最终报价。"
  - "费用问题应以品牌官方收费标准、当地授权服务网点和用户确认的服务单为准。"
  - "客服可以解释收费构成和判断条件，但不能在未检测前承诺免费或给最终金额。"

reference_basis:
  - source: "LG 中国有偿服务政策"
    key_points:
      - "包外维修费通常由维修费、上门费、零件费、拉修费等构成。"
      - "有偿安装费通常由拆装机费、材料费、特殊环境安装费等构成。"
      - "维修可按调试、小修、中修、大修分类。"
  - source: "小天鹅服务政策"
    key_points:
      - "包修期外产品的上门费、维修费和配件费由用户承担。"
      - "服务网点应出示统一收费标准并提供收费票据。"
      - "非指定服务网点修理造成损坏、无有效凭证且无法证明在包修期内、超过包修期限等不属免费包修范围。"
  - source: "LG 中国包修政策"
    key_points:
      - "洗衣机整机和主要部件存在不同包修期限。"
      - "洗干一体机和干衣机的主要部件范围与普通洗衣机不同。"
  - source: "海尔洗衣机售后保修政策"
    key_points:
      - "商用洗衣机、家庭用以外洗涤产品和家用机的服务政策可能不同。"
      - "维修完成后的整机和更换零部件可能存在后续包修期。"

fee_components:
  - component: "上门费"
    meaning: "服务人员到用户地点产生的服务路程或上门成本。"
    when_may_apply:
      - "包修期外维修"
      - "保内但检测为非产品质量原因"
      - "偏远区域或跨区域服务"
    agent_rule: "只能说明可能产生，不直接给最终金额。"
  - component: "维修费/人工费"
    meaning: "检查、维修、调试或更换部件产生的人工服务费用。"
    when_may_apply:
      - "包修期外维修"
      - "人为损坏或使用不当导致故障"
      - "调试、小修、中修、大修等不同维修类型"
    agent_rule: "应提示以服务网点收费标准和检测结论为准。"
  - component: "零件费/配件费"
    meaning: "维修中更换零部件或附件产生的费用。"
    when_may_apply:
      - "包修期外更换配件"
      - "人为损坏、异物损坏、非授权拆修导致配件损坏"
      - "附件、耗材或外观件不在免费包修范围"
    agent_rule: "不要编造配件单价；引导用户以官方配件报价为准。"
  - component: "拉修费/运输搬运费"
    meaning: "需要把机器送到维修站检测或维修时产生的运输、搬运费用。"
    when_may_apply:
      - "现场无法完成维修"
      - "需要返站检测"
      - "用户地址或安装环境导致搬运成本增加"
    agent_rule: "只在确有返站或搬运需求时提示可能产生。"
  - component: "材料费/辅材费"
    meaning: "安装或二次拆装中使用的水管、接头、支架、固定件等材料费用。"
    when_may_apply:
      - "首次安装超出基础安装范围"
      - "二次安装、移机、加长管路、改造接口"
    agent_rule: "区分基础安装和额外材料，不承诺所有安装免费。"

charge_decision_rules:
  - rule_id: "FEE-IN-WARRANTY-QUALITY"
    situation: "在包修期内，家庭正常使用，经售后检测确认为产品质量故障。"
    recommended_reply: "一般按保内质量故障处理，不应向用户收取对应保内维修费用；最终以检测结论和服务单为准。"
  - rule_id: "FEE-IN-WARRANTY-NON-QUALITY"
    situation: "仍在包修期内，但故障由外部水压、地漏堵塞、排水管安装、洗涤剂过量、过滤器长期未清理等非产品质量原因造成。"
    recommended_reply: "可能不属于免费包修范围，服务网点可按规定收取上门、调试或维修相关费用。"
  - rule_id: "FEE-OUT-OF-WARRANTY"
    situation: "超过整机或主要部件包修期限。"
    recommended_reply: "通常按包修期外维修处理，可能产生上门费、维修费和配件费。"
  - rule_id: "FEE-USER-DAMAGE"
    situation: "人为摔碰、进水、异物进入、强拉门、短接门锁、私自拆修或改装导致故障。"
    recommended_reply: "通常不属于免费包修，应转人工或售后检测后按有偿维修处理。"
  - rule_id: "FEE-NO-PROOF"
    situation: "用户无法提供发票、订单、保修卡、机身条码等有效凭证，且无法证明在包修期内。"
    recommended_reply: "可能无法享受免费包修；可引导用户补充订单截图、发票或机身条码，由人工核验。"
  - rule_id: "FEE-COMMERCIAL"
    situation: "机器用于学校、医院、洗衣房、出租房多人高频共用、投币机或其他非家庭场景。"
    recommended_reply: "非家庭使用场景可能适用不同包修期限和服务政策，不能直接承诺免费，应转人工核验。"
  - rule_id: "FEE-INSTALL-BASIC"
    situation: "新机首次基础安装，现场具备合规水电和安装条件。"
    recommended_reply: "通常可按基础安装处理；若需要额外材料、改造、加长管路或二次拆装，可能产生材料费或安装费。"
  - rule_id: "FEE-RETURN-EXCHANGE"
    situation: "用户要求 7 日退货或 15 日换货。"
    recommended_reply: "应确认购买日期和凭证，并由售后检测是否为性能故障或质量故障；客服不能仅凭描述承诺退换。"

repair_category_examples:
  - category: "调试"
    examples:
      - "解除童锁"
      - "调整排水管高度"
      - "指导用户减少洗涤剂"
      - "外部水压或地漏问题确认"
    note: "通常是非机器零部件故障，通过设置、外部调整或使用指导恢复。"
  - category: "小修"
    examples:
      - "更换外部软管"
      - "更换门锁、进水阀等易判断部件"
      - "处理简单漏水接口"
    note: "故障现象较明确，检测和更换复杂度较低。"
  - category: "中修"
    examples:
      - "排查间歇性不排水"
      - "检测水位传感器、线束或控制信号"
      - "处理需要拆装多个部件的故障"
    note: "需要一定检测分析，工时较多。"
  - category: "大修"
    examples:
      - "更换主控板或复杂电子部件"
      - "处理多部位故障"
      - "需要返站或专业设备检测"
    note: "复杂度高，可能涉及拉修、运输或多次确认。"

agent_constraints:
  - "不要输出虚构价格区间。"
  - "不要说“肯定免费”或“肯定收费”，除非政策条件和检测结论都明确。"
  - "先确认购买凭证、购买时间、使用场景、是否人为拆修，再解释费用。"
  - "涉及偏远地区、商用场景、退换货争议、凭证缺失或用户已拆机，转人工。"
  - "高风险故障先要求断电关水，再讨论是否收费。"
